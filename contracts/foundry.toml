[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
remappings = ["@openzeppelin/=lib/openzeppelin-contracts/"]

[fmt]
line_length = 100
tab_width = 4

# Configure per-network RPCs + explorer keys via environment variables.
# Robinhood Chain is an EVM L2; fill RPC_URL / CHAIN_ID from its docs.
[rpc_endpoints]
robinhood = "${RPC_URL}"

[etherscan]
robinhood = { key = "${ETHERSCAN_API_KEY}", url = "${EXPLORER_API_URL}" }
